name: Cricket news pipeline

# Разписание: на всеки 15 минути + ръчно пускане (с опция за тест на алармата).
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      force_fail:
        description: "Изкуствен провал (за тест на имейл-алармата)"
        type: boolean
        default: false

# Не пускай два конвейера едновременно — сериализира достъпа до кеша/базата.
concurrency:
  group: pipeline
  cancel-in-progress: false

# Вече НЕ commit-ваме база обратно → трябва ни само четене за checkout.
permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      # Всички тайни идват от GitHub Actions Secrets (Settings → Secrets and
      # variables → Actions). Никога в кода.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ZYTE_API_KEY: ${{ secrets.ZYTE_API_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      # Предпазни тавани и retention за подрязването (конфигурируеми тук).
      MAX_COMBINES_PER_RUN: "10"
      MAX_SENDS_PER_RUN: "10"
      EMBED_RETENTION_DAYS: "3"
      ROW_RETENTION_DAYS: "14"
      FORCE_FAIL: ${{ github.event.inputs.force_fail }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Персистенция чрез CACHE (не git). Rolling key: пазим уникален ключ на
      # пускане, а restore-keys връща най-скорошния — така състоянието се носи
      # между run-овете, БЕЗ базата да влиза в хранилището. ──────────────────
      - name: Restore state from cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/cricket.db
            data/archive.db
          key: cricket-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            cricket-state-

      - name: Seed working DB on first run (cache miss)
        run: |
          if [ ! -f data/cricket.db ]; then
            echo "Няма кеширана база — сидвам от committed data/seed.db"
            cp data/seed.db data/cricket.db
          else
            echo "Възстановена база от кеша ($(du -h data/cricket.db | cut -f1))."
          fi

      - name: Run pipeline
        run: python -m src.pipeline

      - name: Save state to cache
        if: always()   # запазваме състоянието дори при провал (нищо да не се губи/праща пак)
        uses: actions/cache/save@v4
        with:
          path: |
            data/cricket.db
            data/archive.db
          key: cricket-state-${{ github.run_id }}-${{ github.run_attempt }}

      # ── Архивът като downloadable артефакт. Gate: веднъж дневно (първото
      # пускане след 00:00 UTC) + винаги при ръчно пускане — за да не трупаме
      # хиляди артефакти на всеки 15 мин. Ретенция 90 дни (максимумът на free). ──
      - name: Decide archive upload
        id: arch
        if: always()
        run: |
          MIN=$((10#$(date -u +%H%M)))
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$MIN" -lt 15 ]; then
            echo "upload=true" >> "$GITHUB_OUTPUT"
          else
            echo "upload=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload archive artifact
        if: always() && steps.arch.outputs.upload == 'true' && hashFiles('data/archive.db') != ''
        uses: actions/upload-artifact@v4
        with:
          name: cricket-archive
          path: data/archive.db
          retention-days: 90

      # Провал → червен run (вградените известия на GitHub) + имейл-аларма.
      # Английска тема, за да не пада в спам; стъпката е ЧЕРВЕНА, ако не тръгне.
      - name: Alert on failure
        if: failure()
        run: python -m src.notify --alert "Cricket pipeline run failed."
